<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="top-bar">
        <div class="top-bar-left">
            <span class="app-title">Sistema de Alunos</span>
        </div>
        <div class="top-bar-right">
            <span class="user-label">Usuário: <strong id="user-email">-</strong></span>
            <button class="logout-button" onclick="logout()">Sair</button>
        </div>
    </header>

    <div class="container main-container">
        <h2>Cadastro de Alunos</h2>

        <div class="formulario">
            <input type="hidden" id="alunoId">
            <input type="text" id="nome" placeholder="Nome">
            <input type="number" id="idade" placeholder="Idade">
            <input type="text" id="curso" placeholder="Curso">
            <button id="btnSalvar" onclick="cadastrarAluno()">Cadastrar</button>
        </div>

        <h3>Lista de Alunos</h3>

        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nome</th>
                    <th>Idade</th>
                    <th>Curso</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="tabelaAlunos"></tbody>
        </table>
    </div>

    <script src="script.js"></script>
</body>
</html>
